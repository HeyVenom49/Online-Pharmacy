apiVersion: v1
kind: ConfigMap
metadata:
  name: pharmacy-config
  namespace: pharmacy
data:
  DATABASE_HOST: postgres
  DATABASE_PORT: "5432"
  REDIS_HOST: redis
  RABBITMQ_HOST: rabbitmq
  EUREKA_HOSTNAME: eureka
  CONFIG_SERVER_URL: http://config:8888

---
apiVersion: v1
kind: Secret
metadata:
  name: pharmacy-secrets
  namespace: pharmacy
type: Opaque
stringData:
  JWT_SECRET: your-jwt-secret-key-here
  DATABASE_PASSWORD: your-database-password
  REDIS_PASSWORD: your-redis-password

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pharmacy-gateway
  namespace: pharmacy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pharmacy-gateway
  template:
    metadata:
      labels:
        app: pharmacy-gateway
    spec:
      containers:
        - name: gateway
          image: ghcr.io/your-repo/pharmacy-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: kubernetes
          envFrom:
            - configMapRef:
                name: pharmacy-config
            - secretRef:
                name: pharmacy-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: pharmacy-gateway
  namespace: pharmacy
spec:
  type: LoadBalancer
  selector:
    app: pharmacy-gateway
  ports:
    - port: 80
      targetPort: 8080
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['gateway:8080']

  - job_name: 'identity'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['identity:8081']

  - job_name: 'catalog'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['catalog:8082']

  - job_name: 'orders'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['orders:8083']

  - job_name: 'admin'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['admin:8084']

  - job_name: 'notifications'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['notifications:8085']
apiVersion: 1

# Omit uid so Grafana can create/update without conflicting with existing DB state.
# Panels reference Prometheus by type; isDefault makes this the default datasource.
datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    orgId: 1
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST
      timeInterval: 15s